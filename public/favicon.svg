<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Vibrant indigo to purple gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <!-- Soft drop shadow to make it pop on both light and dark browser tabs -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>
  <!-- Thick bold 'C' to ensure high visibility at 16x16 tab scale -->
  <path d="M390 120 C350 80, 298 60, 240 60 C130 60, 40 150, 40 260 C40 370, 130 460, 240 460 C298 460, 350 440, 390 400 L320 330 C298 350, 270 360, 240 360 C185 360, 140 315, 140 260 C140 205, 185 160, 240 160 C270 160, 298 170, 320 190 L390 120 Z" fill="url(#grad)" filter="url(#shadow)" />
</svg>